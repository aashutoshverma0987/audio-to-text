<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Speech Sentiment Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.container-box{
width:650px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.upload-box{
border:2px dashed #ccc;
padding:30px;
text-align:center;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
border-color:#007bff;
background:#f3f7ff;
}

.record-btn{
width:60px;
height:60px;
border-radius:50%;
border:none;
background:red;
color:white;
font-size:20px;
}

.result-box{
margin-top:20px;
padding:20px;
border-radius:10px;
background:#f5f7ff;
}

.positive{color:green;font-weight:bold;}
.negative{color:red;font-weight:bold;}
.neutral{color:orange;font-weight:bold;}

.loader{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container-box">

<h2 class="text-center mb-4">🎤 Speech Sentiment Analyzer</h2>

<form method="POST" enctype="multipart/form-data" id="form">

<label class="upload-box">

📂 Drag & Drop Audio<br><br>

<input type="file" name="audio" id="audioInput" hidden required>

<span class="text-muted">MP3 / WAV Supported</span>

<p id="fileName" class="text-success mt-2"></p>

</label>

<br>

<div class="text-center">

<button type="button" class="record-btn" onclick="startRecording()">
🎙
</button>

<p class="text-muted">Record Audio</p>

</div>

<br>

<div class="text-center">
<button class="btn btn-primary px-5">
Analyze Speech
</button>
</div>

</form>

<div class="loader text-center" id="loader">

<div class="spinner-border text-primary"></div>
<p>Analyzing audio...</p>

</div>

{% if transcription %}

<div class="result-box">

<h5>📝 Transcription</h5>
<p>{{ transcription }}</p>

</div>

<div class="result-box">

<h5>📊 Sentiment</h5>

{% if sentiment == "POSITIVE" %}
<p class="positive">😊 Positive</p>

{% elif sentiment == "NEGATIVE" %}
<p class="negative">😞 Negative</p>

{% else %}
<p class="neutral">😐 Neutral</p>

{% endif %}

</div>

{% endif %}

</div>

<script>

const form=document.getElementById("form");
const loader=document.getElementById("loader");
const audioInput=document.getElementById("audioInput");
const fileName=document.getElementById("fileName");

form.addEventListener("submit",()=>{
loader.style.display="block";
});

audioInput.addEventListener("change",function(){

if(this.files.length>0){
fileName.innerHTML="✅ File Selected: "+this.files[0].name;
}

});

let mediaRecorder;
let audioChunks=[];

function startRecording(){

navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{

mediaRecorder=new MediaRecorder(stream);

mediaRecorder.start();

audioChunks=[];

mediaRecorder.ondataavailable=e=>{
audioChunks.push(e.data);
};

mediaRecorder.onstop=()=>{

const blob=new Blob(audioChunks,{type:"audio/wav"});

const file=new File([blob],"recording.wav");

const dt=new DataTransfer();
dt.items.add(file);

audioInput.files=dt.files;

fileName.innerHTML="🎙 Recorded File: recording.wav";

};

setTimeout(()=>{
mediaRecorder.stop();
},5000);

});

}

</script>

</body>
</html>
